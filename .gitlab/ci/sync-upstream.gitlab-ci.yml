# =============================================================================
# GitLab CI/CD — Upstream Detection Rule Sync (Scheduled)
# =============================================================================
# Pulls the latest from elastic/detection-rules, regenerates UPSTREAM_CHANGELOG.md,
# and opens a Merge Request for review.
#
# Trigger this via Settings → CI/CD → Schedules (e.g. weekly on Monday 08:00 UTC).
# Set the schedule variable SYNC_UPSTREAM=true so the job activates only on
# scheduled pipelines and not on every push.
#
# Required CI/CD variables
#   GITLAB_TOKEN              — Project access token with `api` + `write_repository`
#                               (use `glpat-...` token; mask + protect)
# =============================================================================

sync:upstream-rules:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  tags:
    - $RUNNER_TAG
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SYNC_UPSTREAM == "true"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $SYNC_UPSTREAM == "true"'
  variables:
    SYNC_BRANCH: "chore/sync-upstream-rules-${CI_PIPELINE_ID}"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq
    - pip install --quiet tomli
    - git config --global user.email "ci@${CI_SERVER_HOST}"
    - git config --global user.name  "Detection-Rules Sync Bot"
  script:
    - python3 scripts/sync_upstream_rules.py --project-root "$CI_PROJECT_DIR" || true
    - |
      if [[ -z "$(git status --porcelain)" ]]; then
        echo "No upstream changes detected."
        exit 0
      fi
    - git checkout -b "$SYNC_BRANCH"
    - git add UPSTREAM_CHANGELOG.md .detection-rules-sync
    - |
      git commit -m "chore: sync upstream detection rules"
    - |
      git push \
        "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        "$SYNC_BRANCH"
    - |
      curl --silent --show-error --fail \
        --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"${SYNC_BRANCH}\",
          \"target_branch\": \"${CI_DEFAULT_BRANCH}\",
          \"title\": \"🔄 Weekly Upstream Detection Rules Sync\",
          \"description\": \"Auto-generated sync from elastic/detection-rules. Review UPSTREAM_CHANGELOG.md.\",
          \"remove_source_branch\": true,
          \"labels\": \"automation,detection-rules,upstream-sync\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
  artifacts:
    paths:
      - UPSTREAM_CHANGELOG.md
    expire_in: 90 days
    when: always
