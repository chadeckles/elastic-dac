# =============================================================================
# GitHub Actions — Sync Upstream Detection Rules (Weekly)
# =============================================================================
# Pulls the latest from elastic/detection-rules, diffs against the last
# sync point, generates a rich changelog, and opens a PR for review.
#
# Schedule: Every Monday at 08:00 UTC
# Manual:   workflow_dispatch
#
# The sync script:
#   1. Clones (blobless) or fetches elastic/detection-rules
#   2. Compares TOML rule files against the last synced SHA
#   3. Parses new/modified rules for metadata (name, type, severity, MITRE)
#   4. Prepends a timestamped entry to UPSTREAM_CHANGELOG.md
#   5. Updates .detection-rules-sync with the new SHA
#   6. Outputs change counts for the PR body
# =============================================================================

name: "Sync Upstream Detection Rules"

on:
  schedule:
    - cron: "0 8 * * 1"        # Every Monday at 08:00 UTC
  workflow_dispatch:             # Manual trigger via Actions UI
    inputs:
      first_sync_full:
        description: "On first sync, catalog all rules (large changelog)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    name: "Sync elastic/detection-rules"
    runs-on: ubuntu-latest

    steps:
      # ---- Checkout our repo ------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history for committing changes

      # ---- Python -----------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TOML parser
        run: pip install tomli

      # ---- Run sync script --------------------------------------------------
      - name: Run upstream sync
        id: sync
        run: |
          EXTRA_ARGS=""
          if [[ "${{ github.event.inputs.first_sync_full }}" == "true" ]]; then
            EXTRA_ARGS="--first-sync-full"
          fi
          python3 scripts/sync_upstream_rules.py \
            --project-root "$GITHUB_WORKSPACE" \
            $EXTRA_ARGS || true
          # Script exits 2 when changes detected (not a failure)

      # ---- Check for changes ------------------------------------------------
      - name: Check for file changes
        id: check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Create PR with changelog ----------------------------------------
      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync upstream detection rules (${{ steps.sync.outputs.upstream_sha }})"
          title: "🔄 Weekly Upstream Detection Rules Sync"
          body: |
            ## Automated Upstream Sync

            This PR was auto-generated by the weekly sync from
            [`elastic/detection-rules`](https://github.com/elastic/detection-rules).

            | Metric | Count |
            |--------|-------|
            | ➕ Added | ${{ steps.sync.outputs.added || '0' }} |
            | ✏️ Modified | ${{ steps.sync.outputs.modified || '0' }} |
            | ❌ Removed | ${{ steps.sync.outputs.deleted || '0' }} |
            | **Total** | **${{ steps.sync.outputs.total_changes || '0' }}** |

            ### What to review
            1. Open **`UPSTREAM_CHANGELOG.md`** for the full summary with rule names,
               types, severities, and MITRE ATT&CK tactics
            2. Decide if any **new upstream rules** should be enabled in `prebuilt_rules.tf`
            3. Check if any **modified rules** affect your custom rules or exceptions
            4. After merging, run `terraform plan` to see if prebuilt rule updates
               are available for your Elastic stack

            ### Files changed
            - `UPSTREAM_CHANGELOG.md` — New changelog entry prepended
            - `.detection-rules-sync` — Updated sync SHA

            ---
            _Auto-generated by [sync-detection-rules](.github/workflows/sync-detection-rules.yml) workflow_
          branch: chore/sync-upstream-rules
          labels: |
            automation
            detection-rules
            upstream-sync
          delete-branch: true

      # ---- Upload changelog artifact ----------------------------------------
      - name: Upload changelog artifact
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-changelog-${{ github.run_id }}
          path: UPSTREAM_CHANGELOG.md
          retention-days: 90
