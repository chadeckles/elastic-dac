# =============================================================================
# Detection as Code - Elastic Stack (Docker Compose)
# =============================================================================
# This Docker Compose file stands up a local Elasticsearch + Kibana environment
# for testing Terraform-based detection rule deployments.
#
# Usage:
#   docker compose up -d          # Start the stack
#   docker compose down -v        # Tear down the stack (and volumes)
#   docker compose logs -f        # Follow logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: es-detection-lab
    environment:
      - node.name=es-detection-lab
      - cluster.name=detection-as-code
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.license.self_generated.type=trial
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - elastic-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Kibana
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kb-detection-lab
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - XPACK_SECURITY_ENABLED=true
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-aVtH3smP9qLzfR2xKw5yN8bC6dE1gJ4nQ7vX0u}
      - SERVER_HOST=0.0.0.0
      - TELEMETRY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - elastic-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"'",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

volumes:
  es-data:
    driver: local

networks:
  elastic-net:
    driver: bridge
